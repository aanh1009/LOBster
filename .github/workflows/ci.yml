name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engine and microstructure tests
        run: python -m pytest tests/test_engine.py tests/test_microstructure.py -v

      - name: Run Hawkes tests
        run: python -m pytest tests/test_hawkes.py -v
